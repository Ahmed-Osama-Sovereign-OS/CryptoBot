# .github/workflows/deploy.yml
name: AhmedOsama Sovereign Bot

on:
  push:
    branches: [ main ]
  schedule:
    # سيقوم البوت بالعمل تلقائياً كل ساعة (Cron Job)
    - cron: '0 * * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Start The Bot
        env:
          # هنا يتم ربط المفتاح السري الذي ستضعه في إعدادات GitHub Secrets
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
        run: |
          python main.py
